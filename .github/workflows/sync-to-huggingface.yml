name: Sync to Hugging Face

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://maxdb1080:$HF_TOKEN@huggingface.co/spaces/maxdb1080/sqa-assistant master:main --force