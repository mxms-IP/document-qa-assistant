<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Q&A</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            background: #f9f9f9;
        }
        h1 { color: #333; }
        textarea {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
        }
        button {
            margin-top: 10px;
            padding: 10px 24px;
            font-size: 1rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:disabled { background: #93c5fd; }
        #answer-box {
            margin-top: 24px;
            padding: 16px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            min-height: 60px;
            color: #111;
            line-height: 1.6;
        }

       
    </style>
</head>
<body>
    
    <h1>Document Q&A</h1>

    <!-- UPLOAD SECTION -->
    <div id="upload-section">
        <h2>Step 1: Upload a PDF</h2>
        <input type="file" id="file-input" accept=".pdf" multiple/>
        <button onclick="uploadFile()">Upload</button>
        <p id="upload-status">No document loaded.</p>
    </div>

    
    <h2>Ask a question.</h2>

    <!-- 1. The user types their question here -->
    <textarea id="question-input" class="qa-section" rows="3" placeholder="e.g. What makes kangaroos special?" disabled="true"></textarea>

    <!-- 2. Clicking this triggers the askQuestion function -->
    <button id="submit-btn" class="qa-section" onclick="askQuestion()" disabled="true">Ask</button>

    <!-- 3. The answer will appear here -->
    <textarea id="answer-box" placeholder="Answer will appear here..." disabled="true"></textarea>



    <script>
        const btn = document.getElementById("submit-btn");
        const answerBox = document.getElementById("answer-box");
        const questionBox = document.getElementById("question-input");

        async function askQuestion() {
            // 4. Grab what the user typed
            const question = questionBox.value;

            // 5. Don't send an empty request
            if (!question.trim()) return;

            // 6. Show loading state so user knows something is happening
            btn.disabled = true;
            answerBox.value = "Thinking...";

            // 7. fetch() sends the POST request — same contract as your curl command
            //    async/await means: wait for the response before continuing
            try {
                const response = await fetch("http://localhost:8000/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });

                // 8. Parse the JSON response — same as response.json() in Python requests
                const data = await response.json();


                // 9. Put the answer into the div
                a// 9. Combine answer and metadata with a visual divider into the textarea
                answerBox.value = `${data.answer}\n\nSources:\n${data.metadata}`;

                

            } catch (error) {
                // 10. If the API is down or CORS blocks it, show a useful message
                answerBox.value = "Error: could not reach the API. Is the server running?";
            } finally {
                // 11. Re-enable the button whether it succeeded or failed
                btn.disabled = false;
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById("file-input");
            const status = document.getElementById("upload-status");

            // 1. Check a file was actually selected
            if (fileInput.files.length === 0) {
                status.textContent = "Please select at least one PDF first.";
                return;
            }


            // 2. FormData is how browsers send files — different from JSON
            //    Think of it as putting the file in an envelope
            const formData = new FormData();
           
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append("files", fileInput.files[i]);
            }

            status.textContent = "Uploading files...this may take a moment.";

            try {
                // 3. Notice: no Content-Type header here
                //    When sending FormData, the browser sets it automatically
                //    If you set it manually you'll break it
                const response = await fetch("http://localhost:8000/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    status.textContent = `Ready! you can ask questions now...`;
                    btn.disabled=false;
                    questionBox.disabled=false;

                } else {
                   // Handle cases where data.detail might be an array or string
                    const detailMsg = typeof data.detail === 'object' ? JSON.stringify(data.detail) : data.detail;
                    status.textContent = `Error: ${detailMsg || "Upload failed."}`;
                }

            } catch (error) {
                status.textContent = "Error: could not reach the API.";
            }
        }
    </script>

</body>
</html>
